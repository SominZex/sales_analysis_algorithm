name: Code Quality & Tests

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

jobs:
  quality-check:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pandas numpy pytest pytest-cov flake8
          # Install project deps if present, skipping heavy optional packages
          if [ -f requirements.txt ]; then
            pip install -r requirements.txt \
              --ignore-requires-python \
              --quiet \
              || true
          fi

      - name: Lint — syntax errors and undefined names (flake8)
        run: |
          flake8 . \
            --count \
            --select=E9,F63,F7,F82 \
            --exclude=.git,__pycache__,venv,vmac,airflow \
            --show-source \
            --statistics

      - name: Run unit tests with coverage
        env:
          PYTHONPATH: automation
        run: |
          pytest tests/ \
            -v \
            --tb=short \
            --cov=. \
            --cov-config=.coveragerc \
            --cov-report=term-missing \
            --cov-report=xml \
            --cov-fail-under=35

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage.xml